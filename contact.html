<!DOCTYPE html>
<html lang="en">
<head>
  <title>Contact | Crazy Craft</title>
  <meta charset="UTF-8" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>

<body>

<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-6">

      <h2 class="mb-4 text-center">Contact Us</h2>
      <form class="card p-4 shadow-sm">
      <input class="form-control mb-3" type="text" placeholder="Name" required>
      <input class="form-control mb-3" type="email" placeholder="Email" required>
      <textarea class="form-control mb-3" rows="4" placeholder="Message"></textarea>
      <button class="btn btn-success w-100">Send Message</button>
    </form>

  </div>
</div>
</div>

</body>
</html>
