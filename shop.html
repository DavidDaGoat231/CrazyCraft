
<html lang="en">
<head>
  <title>Shop | Crazy Craft</title>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand fw-bold" href="index.html">Crazy Craft</a>
    <div class="ms-auto text-white">
    Cart (<span id="cart-count">0</span>)
  </div>
</div>
</nav>

<!-- FEATURED PRODUCT -->
<section class="bg-warning-subtle py-5">
<div class="container">
  <div class="row align-items-center">

    <div class="col-md-6 text-center">
      <img src="https://via.placeholder.com/400x300" class="img-fluid rounded shadow">
    </div>

    <div class="col-md-6">
    <h2 class="fw-bold">🔥 All-in-One Writing Tool</h2>
    <p class="lead">
      Pencil, pen, marker, and highlighter — all in one.
    </p>
    <p>
      Switch between tools instantly and simplify your creative workflow.
      Perfect for school, art, and everyday use.
    </p>
    <h4 class="text-success fw-bold">$12.99</h4>

        <button class="btn btn-success btn-lg mt-2"
          onclick="addToCart('All-in-One Tool')">
          Add to Cart
        </button>
      </div>

    </div>
  </div>
</section>

<!-- PRODUCT GRID -->
<div class="container py-5">
  <div class="row g-4" id="product-list"></div>
</div>

<script>
/* PRODUCT DATA (SMART PART) */
const products = [
{
    name: "Color Gel Pens",
    price: 3.49,
    img: "https://via.placeholder.com/200"
  },
  {
    name: "Sketch Pencils",
    price: 6.49,
    img: "https://via.placeholder.com/200"
  },
  {
    name: "Neon Highlighters",
    price: 5.49,
    img: "https://via.placeholder.com/200"
  },
  {
    name: "Art Markers",
    price: 8.99,
    img: "https://via.placeholder.com/200"
  }
];

/* RENDER PRODUCTS */
function renderProducts() {
  const container = document.getElementById("product-list");

  products.forEach(product => {
    container.innerHTML += `
      <div class="col-md-3">
        <div class="card h-100 shadow-sm text-center">
          <img src="${product.img}" class="card-img-top">
          <div class="card-body">
          <h5>${product.name}</h5>
            <p class="text-success fw-bold">$${product.price}</p>
            <button class="btn btn-success w-100"
              onclick="addToCart('${product.name}')">
              Add to Cart
            </button>
          </div>
        </div>
      </div>
    `;
  });
}
/* CART SYSTEM */
let cart = JSON.parse(localStorage.getItem("cart")) || [];

function addToCart(item) {
  cart.push(item);
  localStorage.setItem("cart", JSON.stringify(cart));
  updateCart();
}

function updateCart() {
  document.getElementById("cart-count").innerText = cart.length;
}

/* INIT */
window.onload = () => {
  renderProducts();
  updateCart();
};
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
